version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd nova-sonic-app && npm ci
    build:
      commands:
        - cd nova-sonic-app && npm run build
  artifacts:
    baseDirectory: nova-sonic-app/dist
    files:
      - "**/*"
  cache:
    paths:
      - nova-sonic-app/node_modules/**/*
